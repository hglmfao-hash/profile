<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal Portfolio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="particles"></canvas>

  <div id="loadGlitch" class="load-glitch"></div>

  <div id="app"></div>

  <div class="search-modal" id="searchModal">
    <div class="search-overlay" id="searchOverlay"></div>
    <div class="search-container">
      <div class="search-header-input">
        <svg class="search-modal-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" id="searchInput" placeholder="Type a command or search..." autocomplete="off" spellcheck="false" />
        <button id="searchInputClear" class="search-clear-btn" aria-label="Clear input">×</button>
        <kbd id="searchEsc" class="search-esc-hint">ESC</kbd>
      </div>
      <div class="search-results-wrap">
        <div id="searchResults" class="search-results"></div>
      </div>
      <div class="search-footer">
        <div class="search-hints">
          <span><kbd>↑↓</kbd> Navigate</span>
          <span><kbd>↵</kbd> Select</span>
        </div>
        <div class="search-meta">
          <span id="searchCount">0</span> results found
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
